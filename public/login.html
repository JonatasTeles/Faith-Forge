<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <title>Entrar — FaithForge</title>
    <link rel="icon" href="assets/imgs/LogoFaithForge.png">
    <script src="./js/sessao.js"></script>
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/logCas.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="pagina_auth">

        <a href="index.html" class="auth_logo">
            <div class="logo_icone"><img src="assets/imgs/LogoFaithForge.png" alt="Logo Faith Forge"></div>
            <span class="logo_nome">Faith<span>Forge</span></span>
        </a>

        <div class="auth_card">
            <div class="auth_card_header">
                <h1>Bem vindo de volta!</h1>
                <p>Continue forjando sua fé. Entre em sua conta.</p>
            </div>
            <div class="auth_card_corpo">
                <div class="formulario">

                    <div id="login_erro" class="msg_erro"></div>

                    <div class="campo_grupo">
                        <label for="login_email">Email</label>
                        <input type="email" id="login_email" placeholder="seu@email.com" required>
                    </div>

                    <div class="campo_grupo">
                        <label for="login_senha">Senha</label>
                        <div class="campo_senha">
                            <input type="password" id="login_senha" placeholder="••••••••" required>
                            <button type="button" class="btn_ver_senha" onclick="alternarSenha('login_senha', this)"><i data-lucide="eye"></i></button>
                        </div>
                    </div>

                    <div class="esqueci_senha">
                        <a href="#">Esqueci minha senha</a>
                    </div>

                    <button id="btn_login" class="btn_principal btn_bloco" onclick="entrar()">Entrar</button>
                </div>

                <div class="auth_rodape">
                    Não tem conta? <a href="cadastro.html">Crie uma aqui</a>
                </div>
            </div>
        </div>

        <a href="index.html" class="auth_voltar">← Voltar para o início</a>

    </div>

</body>

</html>

<script>
    const msgErro = document.getElementById('login_erro');
    const btnLogin = document.getElementById('btn_login');

    function alternarSenha(idCampo, btn) {
        const campo = document.getElementById(idCampo);
        const icone = btn.querySelector('[data-lucide]');
        if (campo.type === 'password') {
            campo.type = 'text';
            icone.setAttribute('data-lucide', 'eye-off');
        } else {
            campo.type = 'password';
            icone.setAttribute('data-lucide', 'eye');
        }

        lucide.createIcons();
    }

    lucide.createIcons();

    function entrar() {

        var emailVar = login_email.value;
        var senhaVar = login_senha.value;
        sumirMensagem();

        if (emailVar == "" || senhaVar == "") {
            msgErro.textContent = "Por favor, preencha todos os campos.";
            msgErro.classList.add('visivel');
            return false;
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;

                    btnLogin.textContent = 'Entrando!';

                    setTimeout(function () {
                        window.location = "dashboard/dashboard.html";
                    }, 1000);

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    const campos = [document.getElementById('login_email'), document.getElementById('login_senha')];

    campos.forEach(campo => {
        campo.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                entrar();
            }
        })
    })

    function sumirMensagem() {
        msgErro.classList.remove('visivel');
    }

</script>
