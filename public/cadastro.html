<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro — FaithForge</title>
    <link rel="icon" href="assets/imgs/LogoFaithForge.png">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/logCas.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>

    <div class="pagina_auth">

        <a href="index.html" class="auth_logo">
            <div class="logo_icone"><img src="assets/imgs/LogoFaithForge.png" alt="Logo Faith Forge"></div>
            <span class="logo_nome">Faith<span>Forge</span></span>
        </a>

        <div class="auth_card">
            <div class="auth_card_header">
                <h1>Crie sua Conta</h1>
                <p>Comece sua jornada em direção a uma fé inabalável.</p>
            </div>
            <div class="auth_card_corpo">
                <form class="formulario">

                    <div id="cad_erro" class="msg_erro"></div>

                    <div class="campo_grupo">
                        <label for="cad_nome">Nome completo</label>
                        <input type="text" id="cad_nome" placeholder="Seu nome" required>
                    </div>

                    <div class="campo_grupo">
                        <label for="cad_email">Email</label>
                        <input type="email" id="cad_email" placeholder="seu@email.com" required>
                    </div>

                    <div class="campo_grupo">
                        <label for="cad_senha">Senha</label>
                        <div class="campo_senha">
                            <input type="password" id="cad_senha" placeholder="Mínimo 8 caracteres"
                                oninput="atualizarForca()" required>
                            <button type="button" class="btn_ver_senha" onclick="alternarSenha('cad_senha', this)"><i
                                    data-lucide="eye"></i></button>
                        </div>
                        <div class="forca_senha_barras">
                            <div class="forca_barra" id="barra1"></div>
                            <div class="forca_barra" id="barra2"></div>
                            <div class="forca_barra" id="barra3"></div>
                            <div class="forca_barra" id="barra4"></div>
                        </div>
                    </div>

                    <div class="campo_grupo">
                        <label for="cad_confirma">Confirmar senha</label>
                        <div class="campo_senha">
                            <input type="password" id="cad_confirma" placeholder="Repita a senha" required>
                            <button type="button" class="btn_ver_senha" onclick="alternarSenha('cad_confirma', this)"><i
                                    data-lucide="eye"></i></button>
                        </div>
                    </div>

                    <button type="button" id="btn_cad" class="btn_principal btn_bloco" onclick="cadastrar()">Criar
                        conta</button>
                </form>

                <div class="auth_rodape">
                    Já tem conta? <a href="login.html">Faça login</a>
                </div>
            </div>
        </div>

        <a href="index.html" class="auth_voltar">← Voltar para o início</a>

    </div>

</body>

</html>

<script>
    const msgErro = document.getElementById('cad_erro');
    const btnCad = document.getElementById('btn_cad');

    function cadastrar() {
        btnCad.disabled = true;
        var nomeVar = cad_nome.value.trim();
        var emailVar = cad_email.value.trim();
        var senhaVar = cad_senha.value;
        var confirmacaoSenhaVar = cad_confirma.value;
        sumirMensagem();

        if (
            nomeVar == "" ||
            emailVar == "" ||
            senhaVar == "" ||
            confirmacaoSenhaVar == ""
        ) {
            mostrarErro("Por favor, preencha todos os campos.");
            btnCad.disabled = false;
            return false;
        }
        if (!emailVar.includes('@') || !emailVar.includes('.')) {
            mostrarErro("Email inválido");
            btnCad.disabled = false;
            return false;
        }
        if (senhaVar !== confirmacaoSenhaVar) {
            mostrarErro("As senhas não coincidem.");
            btnCad.disabled = false;
            return false;
        }
        if (senhaVar.length < 8) {
            mostrarErro("A senha deve ter pelo menos 8 caracteres.");
            btnCad.disabled = false;
            return false;
        }

        fetch("/usuarios/cadastrar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                nomeServer: nomeVar,
                emailServer: emailVar,
                senhaServer: senhaVar
            }),
        })
            .then(function (resposta) {
                console.log("resposta: ", resposta);

                if (resposta.ok) {
                    btnCad.textContent = "Sucesso! Redirecionando";

                    setTimeout(() => {
                        window.location = "login.html";
                    }, "2000");
                } else {
                    btnCad.disable = false;
                    throw "Houve um erro ao tentar realizar o cadastro!";
                }
            })
            .catch(function (resposta) {
                console.log(`#ERRO: ${resposta}`);
            });

        return false;
    }

    function mostrarErro(msg) {
        const el = document.getElementById('cad_erro');
        el.textContent = msg;
        el.classList.add('visivel');
    }

    function atualizarForca() {
        const senha = document.getElementById('cad_senha').value;
        const cores = ['#d4183d', '#FF8C00', '#FFB347', '#22c55e'];
        let pontos = 0;
        if (senha.length >= 8) pontos++;
        if (/[A-Z]/.test(senha)) pontos++;
        if (/[0-9]/.test(senha)) pontos++;
        if (/[^A-Za-z0-9]/.test(senha)) pontos++;

        for (let i = 1; i <= 4; i++) {
            const barra = document.getElementById('barra' + i);
            barra.style.backgroundColor = i <= pontos ? cores[pontos - 1] : '#E5E7EB';
        }
    }

    function alternarSenha(idCampo, btn) {
        const campo = document.getElementById(idCampo);
        const icone = btn.querySelector('[data-lucide]');
        if (campo.type === 'password') {
            campo.type = 'text';
            icone.setAttribute('data-lucide', 'eye-off');
        } else {
            campo.type = 'password';
            icone.setAttribute('data-lucide', 'eye');
        }

        lucide.createIcons();
    }

    lucide.createIcons();

    function sumirMensagem() {
        msgErro.classList.remove('visivel');
    }
</script>
